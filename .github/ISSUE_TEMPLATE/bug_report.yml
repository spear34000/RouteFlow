name: Bug report
description: Report a reproducible problem in RouteFlow
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: input
    id: version
    attributes:
      label: RouteFlow version
      placeholder: 1.0.23
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 24.15.0
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - websocket
        - sse
        - not applicable
    validations:
      required: true
  - type: textarea
    id: adapter
    attributes:
      label: Adapter or store
      description: Describe the adapter, RouteStore, or custom data layer involved.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share the smallest code sample or steps that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
